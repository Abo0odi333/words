            --bg-main: #f9fafb;
            --card-bg: #ffffff;
            --success: #16a34a;
            --error: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .setup-card, .quiz-card, .results-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f3f4f6;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            background-color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .btn {
            display: inline-block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 15px;
            text-align: center;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-meta {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #e5e7eb;
            padding: 14px;
            border-radius: 8px;
            text-align: right;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #14532d !important;
        }

        .option-btn.incorrect {
            background-color: #fee2e2 !important;
            border-color: var(--error) !important;
            color: #7f1d1d !important;
        }

        .hidden {
            display: none !important;
        }

        .result-score {
            font-size: 48px;
            font-weight: 900;
            color: var(--primary-color);
            text-align: center;
            margin: 20px 0;
        }

        .translation-hint {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: -15px;
            margin-bottom: 15px;
            background-color: #f3f4f6;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }

</head>

            { word: "Consistent", meaning: "Steady", ar: "ثابت" },
            { word: "Peripheral", meaning: "Secondary", ar: "هامشي" },
            { word: "Lanes", meaning: "Routes", ar: "ممرات" },
            { word: "Recur", meaning: "Repeat", ar: "يتكرر" },
            { word: "Pioneering", meaning: "Original", ar: "أصلي" },
            { word: "Pitting", meaning: "Forcing", ar: "مواجهة" },
            { word: "Moot", meaning: "Arguable", ar: "موضع نقاش" },
            { word: "Exorbitant", meaning: "Steep", ar: "هائل" },
            { word: "Also", meaning: "As well", ar: "أيضاً" },
            { word: "soil", meaning: "Land", ar: "تربة" },
            { word: "Inhabited", meaning: "Occupied", ar: "مأهولة" },
            { word: "Indigenous", meaning: "Native", ar: "سكان محليين" },
            { word: "familiar", meaning: "Well-known", ar: "مألوف" },
            { word: "methods", meaning: "ways", ar: "طرق" },
            { word: "distinct", meaning: "different", ar: "مختلف" },
            { word: "comprise", meaning: "contain", ar: "يضم" },
            { word: "constitute", meaning: "forms", ar: "تشكل" },
            { word: "identify", meaning: "name", ar: "يصنف" },
            { word: "agricultural", meaning: "farming", ar: "زراعي" },
            { word: "random", meaning: "unplanned", ar: "عشوائي" },
            { word: "legitimate", meaning: "acceptable", ar: "مقبول" },
            { word: "perplexed", meaning: "confused", ar: "مرتبك" },
            { word: "aquatic", meaning: "ocean", ar: "مائي" },
            { word: "polluting", meaning: "harming", ar: "ملوث" },
            { word: "acidic", meaning: "toxic", ar: "حمضي" },
            { word: "purchase", meaning: "buy", ar: "شراء" },
            { word: "hike", meaning: "increase", ar: "زيادة" },
            { word: "alarming", meaning: "frightening", ar: "مفزع" },
            { word: "plunge", meaning: "launch", ar: "إطلاق بقوة" }
        ]
    };

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    // تجميع كل المترادفات المتاحة في ملف واحد لإنشاء الخيارات الخاطئة منها
    const allMeaningsPool = [];
    for (let model in allData) {
        allData[model].forEach(item => {
            if(!allMeaningsPool.includes(item.meaning)) {
                allMeaningsPool.push(item.meaning);
            }
        });
    }

    // تشغيل عند تحميل الصفحة
    window.onload = function() {
        const select = document.getElementById('model-select');
        for (let modelName in allData) {
            let option = document.createElement('option');
            option.value = modelName;
            option.textContent = modelName + ` (${allData[modelName].length} كلمات)`;
            select.appendChild(option);
        }
    };

    // بدء الاختبار لنموذج معين
    function startQuiz() {
        const selectedModel = document.getElementById('model-select').value;
        const rawData = allData[selectedModel];
        
        // خلط الكلمات لضمان التنوع العشوائي الكامل عند كل محاولة بدء جديدة
        currentQuestions = [...rawData].sort(() => 0.5 - Math.random());
        currentQuestionIndex = 0;
        score = 0;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        showQuestion();
    }

    // عرض السؤال الحالي
    function showQuestion() {
        hasAnswered = false;
        document.getElementById('next-btn').classList.add('hidden');
        
        // إخفاء الترجمة العربية في بداية السؤال الجديد
        const translationElement = document.getElementById('translation-hint');
        translationElement.classList.add('hidden');
        
        const currentItem = currentQuestions[currentQuestionIndex];
        
        // تحديث شريط التقدم والبيانات الميتا
        const total = currentQuestions.length;
        document.getElementById('question-number').textContent = `السؤال ${currentQuestionIndex + 1} من ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentQuestionIndex) / total) * 100}%`;
        
        // تعيين نصوص الكلمات
        document.getElementById('question-word').textContent = currentItem.word;
        document.getElementById('translation-hint').textContent = `الترجمة التقريبية: ${currentItem.ar}`;

        // توليد الخيارات (الخيار الصحيح + 3 خيارات خاطئة من الملف)
        const options = [currentItem.meaning];
        
        // سحب خيارات عشوائية خاطئة لا تشبه الإجابة الصحيحة
        const filteredPool = allMeaningsPool.filter(m => m !== currentItem.meaning);
        const shuffledPool = filteredPool.sort(() => 0.5 - Math.random());
        
        for(let i = 0; i < Math.min(3, shuffledPool.length); i++) {
            options.push(shuffledPool[i]);
        }

        // خلط الخيارات الأربعة لكي لا تصبح الإجابة الصحيحة في نفس المكان دائماً
        options.sort(() => 0.5 - Math.random());

        // بناء أزرار الخيارات داخل الصفحة
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        options.forEach(optionText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = optionText;
            btn.onclick = function() { checkAnswer(btn, optionText, currentItem.meaning); };
            container.appendChild(btn);
        });
    }

    // التحقق من الإجابة المختارة
    function checkAnswer(selectedBtn, chosenOption, correctOption) {
        if (hasAnswered) return; // منع التعديل بعد الاختيار
        hasAnswered = true;

        const container = document.getElementById('options-container');
        const buttons = container.getElementsByClassName('option-btn');

        if (chosenOption === correctOption) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('incorrect');
            // إظهار الإجابة الصحيحة بلون أخضر
            for (let btn of buttons) {
                if (btn.textContent === correctOption) {
                    btn.classList.add('correct');
                }
            }
        }

        // إظهار الترجمة العربية الآن بعد الاختيار لتعزيز الحفظ والفهم للمتعلم
        document.getElementById('translation-hint').classList.remove('hidden');

        // إظهار زر الانتقال للسؤال القادم
        document.getElementById('next-btn').classList.remove('hidden');
    }

    // الانتقال للسؤال التالي أو عرض النتيجة
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    // شاشة عرض النتيجة النهائية
    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        const total = currentQuestions.length;
        document.getElementById('score-text').textContent = `${score} / ${total}`;
        
        const percentage = (score / total) * 100;
        let feedback = "";
        if (percentage === 100) feedback = "ممتـاز! إجابة كاملة وصحيحة 🎯";
        else if (percentage >= 80) feedback = "عمل رائع جداً! أداؤك متميز 👏";
        else if (percentage >= 50) feedback = "أداء جيد، لكن تحتاج لمراجعة بعض الكلمات 👍";
        else feedback = "حاول مرة أخرى لتثبيت وحفظ المفردات بشكل أفضل 📚";
        
        document.getElementById('feedback-text').textContent = feedback;
    }

    // إعادة تصفير التطبيق والعودة للقائمة الرئيسية
    function restartApp() {
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }
</script>
